#Definer side
- name: Hers
  width: wide
  hide-desktop-navigation: true
  center-vertically: true

#Venstre kolonne
  columns:
    - size: small
      widgets:
#klokke
        - type: clock
          hour-format: 24h
          timezones:
            - timezone: Asia/Tokyo
              label: Tokyo
#RSS feed
        - type: rss
          title: RSS
          style: horisontal-cards
          collapse-after: 5
          feeds:
            - url: https://www.nrk.no/toppsaker.rss
              title: NRK

#Søk

    - size: full
      widgets:
        - type: search
          autofocus: true

#Bokmerker

        - type: bookmarks
          groups:
            - title: General
              links:
                - title: Mail
                  url: https://outlook.office365.com/mail/

                - title: YouTube
                  url: https://www.youtube.com/

                - title: Netflix
                  url: https://netflix.com/

            - title: Fun
              links:
                - title: GoSuperModel
                  url: https://gosupermodel.com/

                - title: Tracktive
                  url: https://my.tractive.com/

                - title: Lorem Ipsum
                  url: https://www.michelson.no/hers

            - title: Social
              links:
                - title: Reddit
                  url: https://www.reddit.com/

                - title: Twitter
                  url: https://twitter.com/

                - title: Instagram
                  url: https://www.instagram.com/

#Videoer

        - type: videos
          channels:
            - UCYJPby9DRCteedh5tfxVbrw #SMOSHPIT
            - UCJ2ZDzMRgSrxmwphstrm8Ww #SMOSHGAMES
            - UCY30JRSgfhYXA6i6xX1erWg #SMOSH

#Høyre kolonne
    - size: small
      widgets:

#Vær
        - type: weather
          units: metric
          hour-format: 12h
          location: Hamar, Norway
#NASA
        - $include: nasa.yml
