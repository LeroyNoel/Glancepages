#Definer side
- name: Hers
  width: wide
  hide-desktop-navigation: true
  center-vertically: true

#Venstre kolonne
  columns:
    - size: small
      widgets:
#klokke
        - type: clock
          hour-format: 24h
          timezones:
            - timezone: Asia/Tokyo
              label: Tokyo
#RSS feed
        - type: rss
          title: RSS
          style: horisontal-cards
          collapse-after: 5
          feeds:
            - url: https://www.nrk.no/toppsaker.rss
              title: NRK

#Søk

    - size: full
      widgets:
        - type: search
          autofocus: true

#Bokmerker

        - type: bookmarks
          groups:
            - title: General
              links:
                - title: Gmail
                  url: https://mail.google.com/mail/u/0/

                - title: YouTube
                  url: https://www.youtube.com/

                - title: GitHub
                  url: https://github.com/

            - title: Wiki
              links:
                - title: Wowhead
                  url: https://www.wowhead.com/

                - title: OSRS Wiki
                  url: https://oldschool.runescape.wiki/

                - title: Destiny Wiki
                  url: https://www.destinypedia.com/

            - title: Social
              links:
                - title: Reddit
                  url: https://www.reddit.com/

                - title: Twitter
                  url: https://twitter.com/

                - title: Instagram
                  url: https://www.instagram.com/

#Videoer

        - type: videos
          channels:
            - UCRcgy6GzDeccI7dkbbBna3Q #LEMMMINO

#Høyre kolonne
    - size: small
      widgets:

#Vær
        - type: weather
          units: metric
          hour-format: 12h
          location: Hamar, Norway
#NASA
        - $include: nasa.yml
